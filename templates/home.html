<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        form {
            display: grid;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="number"],
        select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #bdc3c7;
        }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result-section {
            margin-top: 40px;
            padding: 25px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-section h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .result-value {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 FWI Prediction</h1>
        <p class="subtitle">Fire Weather Index Prediction System</p>

        <form action="{{ url_for('predict_datapoint')}}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="Temperature">Temperature (°C)</label>
                    <input type="number" id="Temperature" name="Temperature" placeholder="Enter temperature" required>
                </div>
                <div class="form-group">
                    <label for="RH">Relative Humidity (%)</label>
                    <input type="number" id="RH" name="RH" placeholder="Enter RH" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="Ws">Wind Speed (km/h)</label>
                    <input type="number" id="Ws" name="Ws" placeholder="Enter wind speed" required>
                </div>
                <div class="form-group">
                    <label for="Rain">Rain (mm)</label>
                    <input type="number" id="Rain" name="Rain" placeholder="Enter rain" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="FFMC">FFMC Index</label>
                    <input type="number" id="FFMC" name="FFMC" placeholder="Enter FFMC" required>
                </div>
                <div class="form-group">
                    <label for="DMC">DMC Index</label>
                    <input type="number" id="DMC" name="DMC" placeholder="Enter DMC" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="ISI">ISI Index</label>
                    <input type="number" id="ISI" name="ISI" placeholder="Enter ISI" required>
                </div>
                <div class="form-group">
                    <label for="Classes">Classes</label>
                    <input type="text" id="Classes" name="Classes" placeholder="Enter classes" required>
                </div>
            </div>

            <div class="form-group">
                <label for="Region">Region</label>
                <input type="text" id="Region" name="Region" placeholder="Enter region" required>
            </div>

            <button type="submit">🎯 Predict Now</button>
        </form>

        {% if result %}
        <div class="result-section show">
            <h2>📊 Prediction Result:</h2>
            <div class="result-value">{{ result }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
